apiVersion: apps/v1
kind: Deployment
metadata:
  name: storage
spec:
  replicas: 2
  selector:
    matchLabels:
      app: storage
  template:
    metadata:
      labels:
        app: storage
    spec:
      containers:
      - name: storage
        image: us-east1-docker.pkg.dev/underground-gis-demo-499420/underground-gis/storage:latest
        ports:
        - containerPort: 8002
        env:
        - name: DB_URL
          value: "postgresql://postgres:postgres@db:5432/gisdb"
        readinessProbe:
          httpGet:
            path: /health
            port: 8002
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: storage
spec:
  selector:
    app: storage
  ports:
  - port: 8002
    targetPort: 8002
