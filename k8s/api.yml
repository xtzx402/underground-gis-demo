apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api
        image: us-east1-docker.pkg.dev/underground-gis-demo-499420/underground-gis/api:latest
        ports:
        - containerPort: 8004
        env:
        - name: INGESTION_URL
          value: "http://ingestion:8000"
        - name: TRANSFORM_URL
          value: "http://transform:8001"
        - name: STORAGE_URL
          value: "http://storage:8002"
        - name: TTL_URL
          value: "http://ttl:8003"
        readinessProbe:
          httpGet:
            path: /health
            port: 8004
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api
spec:
  selector:
    app: api
  ports:
  - port: 8004
    targetPort: 8004
