name: Build and Deploy to GKE

on:
  push:
    branches: [ master ]

env:
  PROJECT_ID: underground-gis-demo-499420
  GKE_CLUSTER: underground-gis-cluster
  GKE_REGION: us-east1
  REGISTRY: us-east1-docker.pkg.dev/underground-gis-demo-499420/underground-gis

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v1
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v1
      with:
        install_components: gke-gcloud-auth-plugin

    - name: Configure Docker for Artifact Registry
      run: gcloud auth configure-docker us-east1-docker.pkg.dev

    - name: Build and push all services
      run: |
        for service in ingestion transform storage api ttl; do
          docker build -t $REGISTRY/$service:$GITHUB_SHA \
                       -t $REGISTRY/$service:latest \
                       services/$service
          docker push $REGISTRY/$service:$GITHUB_SHA
          docker push $REGISTRY/$service:latest
        done

    - name: Get GKE credentials
      run: |
        gcloud container clusters get-credentials $GKE_CLUSTER \
          --region $GKE_REGION \
          --project $PROJECT_ID
      env:
        USE_GKE_GCLOUD_AUTH_PLUGIN: True

    - name: Deploy to GKE
      env:
        USE_GKE_GCLOUD_AUTH_PLUGIN: True
      run: |
        kubectl apply -f k8s/

    - name: Update images with new SHA
      env:
        USE_GKE_GCLOUD_AUTH_PLUGIN: True
      run: |
        for service in ingestion transform storage api ttl; do
          kubectl set image deployment/$service \
            $service=$REGISTRY/$service:$GITHUB_SHA
        done

    - name: Verify deployment
      env:
        USE_GKE_GCLOUD_AUTH_PLUGIN: True
      run: |
        kubectl rollout status deployment/api
        kubectl rollout status deployment/ingestion
