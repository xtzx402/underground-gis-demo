events {
    worker_connections 1024;
}

http {
    upstream ingestion {
        server ingestion:8000;
    }
    upstream transform {
        server transform:8001;
    }
    upstream storage {
        server storage:8002;
    }
    upstream ttl {
        server ttl:8003;
    }
    upstream api {
        server api:8004;
    }

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    server {
        listen 80;

        # Main API gateway
        location / {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Direct service routes
        location /ingestion/ {
            proxy_pass http://ingestion/;
            proxy_set_header Host $host;
        }

        location /transform/ {
            proxy_pass http://transform/;
            proxy_set_header Host $host;
        }

        location /storage/ {
            proxy_pass http://storage/;
            proxy_set_header Host $host;
        }

        location /ttl/ {
            proxy_pass http://ttl/;
            proxy_set_header Host $host;
        }
    }
}
